# ── Shell integration (habilita tab-completion y otras features) ─────────
shell_integration enabled

# ── Fuente ──────────────────────────────────────────────────
font_family      monospace
font_size        11.0
adjust_line_height 2

# ── Cursor ──────────────────────────────────────────────────
cursor                  #d97706
cursor_text_color       #0d0f17
cursor_blink_interval   0.5

# ── Scrollback ──────────────────────────────────────────────
scrollback_lines        4096

# ── Ventana ─────────────────────────────────────────────────
window_padding_width    8
hide_window_decorations yes
initial_window_width    90c
initial_window_height   24c

# ── Colores — tema Claude ────────────────────────────────────
background  #0d0f17
foreground  #e2e4f0

# Negro
color0  #1a1c27
color8  #2e3147

# Rojo
color1  #e06c75
color9  #f47c85

# Verde
color2  #56c490
color10 #6ddba6

# Amarillo / naranja (acento principal Claude)
color3  #d97706
color11 #f59e0b

# Azul
color4  #213882
color12 #2d4db0

# Magenta / lila (acento secundario Claude)
color5  #8b5cf6
color13 #a78bfa

# Cyan
color6  #38bdf8
color14 #7dd3fc

# Blanco
color7  #c8cce8
color15 #e2e4f0

# ── Selección ───────────────────────────────────────────────
selection_background #213882
selection_foreground #e2e4f0

# ── Scroll ───────────────────────────────────────────────────
wheel_scroll_multiplier  5.0
touch_scroll_multiplier  5.0
# indicador de posición en el scrollback (barra derecha visual)
scrollback_indicator_opacity 1.0
