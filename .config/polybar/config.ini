[colors]
background     = #1e1e2e
background-alt = #313244
foreground     = #cdd6f4
accent         = #89b4fa
accent2        = #a6e3a1
muted          = #585b70
green          = #a6e3a1
red            = #f38ba8

[bar/main]
monitor = ${env:MONITOR:DP-1}
width = 100%
height = 28
offset-y = 0
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
border-size = 0
padding-left = 1
padding-right = 2
module-margin = 1

font-0 = monospace:size=10;2

modules-left   = bspwm
modules-center = date
modules-right  = pulseaudio cpu memory

separator = |
separator-foreground = ${colors.background-alt}

pin-workspaces = true

[bar/secondary]
monitor = ${env:MONITOR:HDMI-1}
width = 100%
height = 28
offset-y = 0
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
border-size = 0
padding-left = 1
padding-right = 2
module-margin = 1

font-0 = monospace:size=10;2

modules-left   = bspwm
modules-center = date
modules-right  = pulseaudio cpu memory

separator = |
separator-foreground = ${colors.background-alt}

[module/bspwm]
type = internal/bspwm
label-focused          = %name%
label-focused-foreground = ${colors.accent}
label-focused-padding  = 2
label-occupied         = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-empty            = %name%
label-empty-foreground = ${colors.muted}
label-empty-padding    = 2
label-urgent           = %name%
label-urgent-foreground = ${colors.red}
label-urgent-padding   = 2

[module/date]
type = internal/date
interval = 5
date = %Y-%m-%d
time = %H:%M
label = %date%  %time%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 2

format-volume          = <ramp-volume> <label-volume>
format-muted           = <label-muted>
format-muted-foreground = ${colors.muted}

label-volume           = %percentage%%
label-muted            = mute

ramp-volume-0          = 
ramp-volume-1          = 
ramp-volume-2          = 
ramp-volume-0-foreground = ${colors.muted}
ramp-volume-1-foreground = ${colors.accent}
ramp-volume-2-foreground = ${colors.accent}

click-right = pavucontrol &

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "cpu "
format-prefix-foreground = ${colors.accent2}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "mem "
format-prefix-foreground = ${colors.accent2}
label = %percentage_used%%

[module/alsa]
type = internal/alsa
master-soundcard = default
master-mixer = Master
interval = 2

format-prefix = "vol "
format-prefix-foreground = ${colors.accent2}
format-volume          = <ramp-volume> <label-volume>
format-muted           = <label-muted>
format-muted-foreground = ${colors.muted}

label-volume           = %percentage%%
label-muted            = mute

ramp-volume-0          = 
ramp-volume-1          = 
ramp-volume-2          = 
ramp-volume-0-foreground = ${colors.muted}
ramp-volume-1-foreground = ${colors.accent}
ramp-volume-2-foreground = ${colors.accent}

click-right = pavucontrol &
